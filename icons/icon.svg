<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" width="128" height="128">
  <!-- Dark background -->
  <rect width="128" height="128" rx="28" fill="#0d1117"/>
  <!-- Subtle gradient overlay -->
  <rect width="128" height="128" rx="28" fill="url(#grad)"/>
  <defs>
    <radialGradient id="grad" cx="30%" cy="25%" r="80%">
      <stop offset="0%" stop-color="#1a1040" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#0d1117" stop-opacity="0"/>
    </radialGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2.5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Refresh arc (320 degrees, open at bottom-right) -->
  <path d="M 64 18 A 46 46 0 1 1 23 85"
        fill="none"
        stroke="#00e5c8"
        stroke-width="9"
        stroke-linecap="round"
        filter="url(#glow)"/>

  <!-- Arrowhead -->
  <polyline points="13,76 23,85 32,76"
            fill="none"
            stroke="#00e5c8"
            stroke-width="9"
            stroke-linecap="round"
            stroke-linejoin="round"
            filter="url(#glow)"/>

  <!-- Heartbeat / ECG pulse line -->
  <polyline points="30,64 44,64 52,40 60,88 67,50 73,78 82,64 98,64"
            fill="none"
            stroke="#00e5c8"
            stroke-width="6.5"
            stroke-linecap="round"
            stroke-linejoin="round"
            filter="url(#glow)"/>
</svg>
